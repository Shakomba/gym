services:

  # ── SQL Server ────────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "HalabjGym_2024!"
      MSSQL_PID: Developer
    expose:
      - "1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "HalabjGym_2024!"
        -Q "SELECT 1" -b -C
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ── DB initialiser (runs schema + seed once, then exits) ─────────────────
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      SA_PASSWORD: "HalabjGym_2024!"
      DB_SERVER: db
    volumes:
      - ./database:/docker-entrypoint-initdb.d
    entrypoint: ["/bin/bash", "/docker-entrypoint-initdb.d/init.sh"]

  # ── Express API ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    environment:
      PORT: "5000"
      DB_SERVER: db
      DB_DATABASE: HalabjGymDB
      DB_USER: sa
      DB_PASSWORD: "HalabjGym_2024!"
      DB_PORT: "1433"
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERT: "true"
      JWT_SECRET: halabja_gym_super_secret_2024
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

  # ── React (nginx) ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sql_data:
